<!DOCTYPE html>
<html lang="en" data-theme="editorial">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>try { var t = localStorage.getItem('tb-theme'); if (t) document.documentElement.setAttribute('data-theme', t); } catch (e) {}</script>
  <title>Reset password · TailorBack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    .rp-wrap { min-height: 100vh; display: grid; place-items: center; padding: 1.5rem; }
    .rp-card { width: 100%; max-width: 420px; background: var(--paper-2, #fff); border: 1px solid var(--line); border-radius: 16px; padding: 1.8rem 1.6rem; }
    .rp-brand { font-weight: 900; font-size: 1.1rem; letter-spacing: -.01em; margin-bottom: 1rem; }
    .rp-brand .ac { color: var(--accent); }
    .rp-card h1 { font-size: 1.4rem; margin: 0 0 .4rem; }
    .rp-sub { color: var(--ink-soft); font-size: .9rem; margin: 0 0 1.2rem; }
    .rp-card label { display: grid; gap: .3rem; font-weight: 700; font-size: .82rem; margin-bottom: .8rem; }
    .rp-card input { min-height: 42px; border: 1px solid var(--line); background: var(--paper); color: var(--ink); border-radius: 9px; padding: .55rem .7rem; font: inherit; }
    .rp-card button { width: 100%; min-height: 44px; border: 0; border-radius: 10px; background: var(--accent); color: #fff; font: inherit; font-weight: 800; cursor: pointer; margin-top: .3rem; }
    .rp-msg { min-height: 1.2rem; font-size: .86rem; margin: .8rem 0 0; text-align: center; }
    .rp-msg.ok { color: var(--good); } .rp-msg.bad { color: var(--accent); }
    .rp-bad { color: var(--accent); font-weight: 600; }
    .rp-home { display: inline-block; margin-top: 1rem; color: var(--accent); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <main class="rp-wrap">
    <div class="rp-card">
      <div class="rp-brand">Tailor<span class="ac">Back</span></div>
      <h1>Reset password</h1>
      {% if not valid %}
        <p class="rp-bad">This reset link is invalid or has expired.</p>
        <p class="rp-sub">Request a new one from the sign-in screen.</p>
        <a class="rp-home" href="/">← Back to TailorBack</a>
      {% else %}
        <p class="rp-sub">Choose a new password for your account.</p>
        <form id="resetForm">
          <label><span>New password</span>
            <input type="password" id="pw" minlength="8" autocomplete="new-password" required /></label>
          <label><span>Repeat new password</span>
            <input type="password" id="pw2" minlength="8" autocomplete="new-password" required /></label>
          <button type="submit">Set new password</button>
          <p class="rp-msg" id="msg"></p>
        </form>
      {% endif %}
    </div>
  </main>
  <script>
    var token = {{ token|tojson }};
    var form = document.getElementById('resetForm');
    if (form) form.addEventListener('submit', async function (e) {
      e.preventDefault();
      var pw = document.getElementById('pw').value;
      var pw2 = document.getElementById('pw2').value;
      var msg = document.getElementById('msg');
      msg.className = 'rp-msg';
      if (pw !== pw2) { msg.textContent = 'Passwords do not match.'; msg.classList.add('bad'); return; }
      if (pw.length < 8) { msg.textContent = 'Password must be at least 8 characters.'; msg.classList.add('bad'); return; }
      try {
        var r = await fetch('/api/auth/reset', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, password: pw }),
        });
        var d = await r.json();
        if (!r.ok) throw new Error(d.message || 'Could not reset password.');
        msg.textContent = (d.message || 'Password reset.') + ' Redirecting…';
        msg.classList.add('ok');
        setTimeout(function () { location.href = '/'; }, 1500);
      } catch (err) { msg.textContent = err.message; msg.classList.add('bad'); }
    });
  </script>
</body>
</html>
